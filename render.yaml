services:
  - type: web
    name: aegis-swarm-backend
    env: node
    plan: free
    buildCommand: npm install --include=dev && cd backend && npx prisma generate && npx prisma db push && cd .. && npm run build -w @aegis-swarm/backend
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
