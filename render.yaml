services:
  - type: web
    name: aegis-swarm-backend
    env: node
    plan: free
    buildCommand: npm install --include=dev && cd backend && npx prisma generate && npx prisma db push
    startCommand: cd backend && npx tsx src/server.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
